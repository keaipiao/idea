# IdeaBox 本地开发环境(只起 PostgreSQL,backend 用 mvn spring-boot:run 本机跑)
#
# 启动:
#   docker compose -f docker-compose.dev.yml --env-file .env up -d
# 停止:
#   docker compose -f docker-compose.dev.yml down
# 完全清空(连数据卷):
#   docker compose -f docker-compose.dev.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: ideabox-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ideabox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ideabox_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ideabox}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
      TZ: Asia/Shanghai
    ports:
      # 改用 25432 避与本机其他 PG 实例冲突;容器内仍 5432(PG 默认)
      # 同步改:.env.example POSTGRES_PORT / application-dev.yml jdbc url / web/.env.example
      - "${POSTGRES_PORT:-25432}:5432"
    volumes:
      # 用 named volume 而非 bind mount。Windows NTFS bind mount 让 PG fsync 性能极差
      # (WSL2 + 9p 协议跨主机文件系统,fsync 比 Linux 慢 10-100x)
      - ideabox_pgdata:/var/lib/postgresql/data
      # 初始化脚本:自动建 ideabox_test database 供集成测试用
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ideabox} -d ${POSTGRES_DB:-ideabox}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  ideabox_pgdata:
    name: ideabox_pgdata
