# IdeaBox 生产环境 nginx 反代
# 详 docs/01-想法记录MVP/PR-3/01-设计.md § 4.7

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;

  # gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;

  # 上游服务
  upstream backend_upstream {
    server backend:8080;
  }
  upstream web_upstream {
    server web:3000;
  }

  server {
    listen 80;
    server_name _;

    # ---------- 安全 header(PR-3 ADR-18 XSS 缓解 + /review P1-M 修法) ----------
    # CSP 妥协:Next.js 16 RSC + hydration 流注入 inline <script>(flight payload + chunk
    # preloading),'self' 单独不允许会导致 hydration mismatch / 首屏白屏。
    # 当前:script-src 加 'unsafe-inline'(等价 Next.js 默认 CSP)
    # 长期 TODO:next.config.ts 配 nonce middleware + script-src 'strict-dynamic' 'nonce-XXX'
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------- API 反代到 backend ----------
    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # 给 Spring Boot 应用 X-Forwarded-* 信任(actuator 等用)
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;

      # 超时
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # ---------- actuator / druid 不暴露到公网(仅本机) ----------
    location /actuator/ { deny all; return 404; }
    location /druid/    { deny all; return 404; }

    # ---------- 其余全部到 Next.js ----------
    location / {
      proxy_pass http://web_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
