# dev profile - 本地开发环境

spring:
  # Druid 监控开关(dev only)
  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        login-username: dev
        login-password: dev
        # 仅允许 localhost 访问 Druid 监控页(127.0.0.1 / ::1)
        allow: 127.0.0.1,::1
        deny: ""
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
        wall:
          # ⚠️ 关 wall filter:它会误判 PostgreSQL 的 partial unique index
          # (CREATE UNIQUE INDEX ... WHERE col IS NOT NULL)为 SQL 注入,导致 Flyway 失败。
          # MyBatis-Plus 全部参数化已免疫普通注入,wall 在 MVP 个人项目里是多余的。
          # 详见 docs/_开发踩坑记录.md "Druid wall + Flyway partial index"
          enabled: false

# dev 期 SQL 详细日志
logging:
  level:
    com.ideabox: DEBUG
    org.mybatis: DEBUG
    com.baomidou.mybatisplus: DEBUG
