# IdeaBox 后端基础配置(所有 profile 共享)
# profile 特定配置见 application-{profile}.yml

spring:
  application:
    name: ideabox-api

  # 数据源(Druid 接管,实际配置在各 profile)
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/ideabox}
    username: ${POSTGRES_USER:ideabox}
    password: ${POSTGRES_PASSWORD:ideabox_dev_password}

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson 时间格式
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Shanghai

  # Web MVC 错误页配置
  web:
    resources:
      add-mappings: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

# Actuator 健康端点
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"

# IdeaBox 自定义配置
ideabox:
  jwt:
    secret: ${IDEABOX_JWT_SECRET:}    # 启动时校验,缺失 fail-fast
    expiration-hours: ${IDEABOX_JWT_EXPIRATION_HOURS:168}
    issuer: ideabox-api

# 日志(level 走 Spring property 占位符,见全局规则)
logging:
  level:
    root: INFO
    com.ideabox: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
