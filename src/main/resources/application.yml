# IdeaBox 后端基础配置(所有 profile 共享)
# profile 特定配置见 application-{profile}.yml

spring:
  application:
    name: ideabox-api

  # 数据源(Druid 接管,实际配置在各 profile)
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    # 2026-05-28 PR-3 默认端口 5432 → 25432 避本机其他 PG 实例冲突
    # prod 部署仍可通过 DATASOURCE_URL 环境变量覆盖
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:25432/ideabox}
    username: ${POSTGRES_USER:ideabox}
    # 密码无默认值,缺失即 fail-fast 启动失败(防止源码默认值进生产)
    password: ${POSTGRES_PASSWORD}

  # Flyway 数据库迁移
  flyway:
    enabled: true
    # 注意:dev profile 额外加 db/migration-dev 跑 seed dev 用户;prod 只跑 db/migration
    locations: classpath:db/migration
    # 基础默认 false。dev profile 显式打开 baseline-on-migrate=true 加速本地;
    # prod 保持 false 强制手工 baseline 防止跳过历史 migration
    baseline-on-migrate: false

  # Jackson 时间格式 + 锁 Result 包装的 data 字段必出契约
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Shanghai
    # 锁住"data 字段始终存在(null 也输出)"契约,防全局 Inclusion 配置漂移
    default-property-inclusion: always

  # Web MVC 错误页 + 让 404 抛 NoHandlerFoundException 进入 GlobalExceptionHandler
  web:
    resources:
      add-mappings: false
  mvc:
    throw-exception-if-no-handler-found: true

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

# Actuator 健康端点
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

# MyBatis-Plus
# 注意:MVP 不用软删,全部硬删 + 外键级联。
# 删除原本悬空的 logic-delete-* 三行配置(实体/表都无 deleted_at 字段,
# 留着是埋雷 - 后续 PR 任意 entity 加 deletedAt 字段会瞬间让所有查询变软删语义)。
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler
  global-config:
    db-config:
      id-type: auto

# IdeaBox 自定义配置
ideabox:
  jwt:
    secret: ${IDEABOX_JWT_SECRET:}    # 启动时校验,缺失 fail-fast
    expiration-hours: ${IDEABOX_JWT_EXPIRATION_HOURS:168}
    issuer: ideabox-api

# 日志(level 走 Spring property 占位符,见全局规则)
logging:
  level:
    root: INFO
    com.ideabox: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
